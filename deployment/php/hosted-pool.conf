; Dedicated, locked-down php-fpm pool for HOSTED projects only.
; nginx snippets generated by NginxConfigService forward `.php` here (9001),
; while the portfolio app uses the default pool (9000). Per-project open_basedir
; is injected per-request by nginx (fastcgi_param PHP_VALUE); the dangerous
; functions below are disabled at the pool level (PHP_INI_SYSTEM, can't be
; re-enabled by a hosted script).

[hosted]
user = www-data
group = www-data
listen = 127.0.0.1:9001
listen.owner = www-data
listen.group = www-data

pm = dynamic
pm.max_children = 10
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 4
pm.max_requests = 500

; Kill long-running / runaway hosted requests.
request_terminate_timeout = 60s

; Hard security floor for untrusted hosted PHP.
php_admin_value[disable_functions] = exec,passthru,shell_exec,system,proc_open,popen,proc_close,proc_get_status,proc_nice,proc_terminate,pcntl_exec,dl,symlink,link,posix_kill,posix_mkfifo,posix_setpgid,posix_setsid,posix_setuid
php_admin_flag[allow_url_fopen] = off
php_admin_flag[allow_url_include] = off
php_admin_value[max_execution_time] = 30
php_admin_value[memory_limit] = 128M
php_admin_value[upload_max_filesize] = 32M
php_admin_value[post_max_size] = 32M
php_admin_value[expose_php] = off
